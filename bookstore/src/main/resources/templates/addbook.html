<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />
    <title>Bookstore</title>
</head>

<body>
    <div class="container">
        <h1>Bookstore</h1>
        <h4>Add new Book</h4>
        <!--form-->
        <div>
            <form method="post" action="#" th:action="@{/savebook}" th:object="${book}">
                <div class="row g-2">
                    <div class="col">
                        <input type="text" th:field="${book.author}" placeholder="Author">
                    </div>

                    <div class="col">
                        <input type="text" th:field="${book.title}" placeholder="Title">
                    </div>

                    <div class="col">
                        <input type="text" th:field="${book.isbn}" placeholder="ISBN">
                    </div>

                    <div class="col">
                        <input type="text" th:field="${book.publicationYear}" placeholder="Publication year">
                    </div>

                    <div class="col">
                        <select id="categorylist" th:field="${book.category}" class="form-select">
                            <option th:each="category: ${category}" th:value="${category.categoryid}"
                                th:text="${category.name}"></option>
                        </select>
                    </div>

                    <div class="col">
                        <button class="btn btn-success" type="submit">Add book</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
